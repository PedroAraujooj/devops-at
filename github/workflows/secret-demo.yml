name: Secret Demo

on:
  push:
  workflow_dispatch:

jobs:
  secret-demo:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
    steps:
      - name: Verificar secret
        run: |
          if [ -n "$API_KEY" ]; then
            echo "API_KEY configurado"
          else
            echo "API_KEY não configurado"
            exit 1
          fi